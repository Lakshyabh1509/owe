<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Dashboard</title>
  <style>
    :root {
      --text-primary: #FAFAFA;
      --text-secondary: #B8B6B0;
      --text-tertiary: #76746E;
      --success: #6BE3A4;
      --warning: #F2C063;
      --danger: #FF6B6B;
      --card-bg: rgba(255, 255, 255, 0.04);
      --card-radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #050506;
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        radial-gradient(400px 320px at 82% 14%, rgba(224, 118, 88, 0.16), transparent 70%),
        radial-gradient(420px 340px at 18% 90%, rgba(180, 180, 200, 0.06), transparent 70%);
      filter: blur(40px);
      animation: wash-drift 36s ease-in-out infinite alternate;
      z-index: 0;
    }

    body::after {
      background-image: radial-gradient(rgba(255, 255, 255, 0.014) 1px, transparent 1px);
      background-size: 3px 3px;
      opacity: 0.6;
      z-index: 1;
      mix-blend-mode: screen;
    }

    @keyframes wash-drift {
      0% {
        transform: translate(-10px, 0px);
      }
      50% {
        transform: translate(12px, -18px);
      }
      100% {
        transform: translate(6px, 10px);
      }
    }

    .page {
      position: relative;
      z-index: 2;
      max-width: 1100px;
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top, 0px) + 28px) 24px 80px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .dash-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin: 0 0 14px;
      background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .mono {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--card-radius);
      padding: 20px;
      backdrop-filter: blur(24px) saturate(1.2);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
    }

    /* Goal ticker */
    .ticker-row {
      display: grid;
      gap: 4px;
      margin-bottom: 18px;
    }

    .goal-ticker {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 12px;
      border-radius: 12px;
      background-image:
        linear-gradient(180deg, rgba(0,0,0,0.42) 0%, rgba(0,0,0,0.30) 100%),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 3px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
      position: relative;
      overflow: hidden;
    }

    .goal-ticker::after {
      content: "";
      position: absolute;
      top: 0;
      left: -40%;
      width: 30%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
      animation: ticker-sweep 8s linear infinite;
    }

    @keyframes ticker-sweep {
      0% { transform: translateX(0); }
      100% { transform: translateX(150%); }
    }

    .goal-ticker-led {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 14px;
    }

    .goal-ticker-led-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px rgba(107, 227, 164, 0.7);
      animation: led-pulse 1.6s ease-in-out infinite;
    }

    @keyframes led-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.85); opacity: 0.45; }
    }

    .goal-ticker-label {
      font-size: 9.5px;
      font-weight: 800;
      letter-spacing: 0.18em;
      color: var(--text-tertiary);
      text-transform: uppercase;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }

    .goal-ticker-stage {
      position: relative;
      flex: 1;
      height: 22px;
      overflow: hidden;
    }

    .goal-ticker-row {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 22px;
      font-size: 12.5px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--text-primary);
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      white-space: nowrap;
    }

    .goal-ticker-status {
      width: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .goal-ticker-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .goal-ticker-meta {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text-secondary);
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }

    .goal-ticker-row.is-leaving {
      animation: ticker-leave 0.45s cubic-bezier(0.55, 0, 0.55, 1) forwards;
    }

    .goal-ticker-row.is-entering {
      animation: ticker-enter 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes ticker-leave {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-100%); }
    }

    @keyframes ticker-enter {
      0% { opacity: 0; transform: translateY(100%); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Day ring */
    .day-ring {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 26px;
      flex-wrap: wrap;
    }

    .ring-wrap {
      width: 168px;
      height: 168px;
      position: relative;
    }

    .ring-wrap svg {
      width: 100%;
      height: 100%;
    }

    .ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: none;
      gap: 4px;
    }

    .ring-percent {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: -0.04em;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }

    .ring-phase {
      font-size: 9.5px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--text-tertiary);
      font-weight: 800;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      margin-top: 5px;
    }

    .ring-clock {
      font-size: 10.5px;
      color: var(--text-tertiary);
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }

    .ring-text {
      max-width: 280px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .ring-status {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .ring-remaining {
      font-size: 12px;
      color: var(--text-secondary);
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }

    .ring-range {
      font-size: 11px;
      color: var(--text-tertiary);
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }

    /* Section */
    .section {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .section-title {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-title::before {
      content: "";
      width: 18px;
      height: 1px;
      background: var(--text-tertiary);
      opacity: 0.6;
    }

    .section-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent);
    }

    .gm-card {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .gm-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .gm-eyebrow {
      font-size: 10.5px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      margin-bottom: 6px;
    }

    .gm-progress-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-wrap: wrap;
    }

    .gm-progress-num {
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -0.045em;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }

    .gm-progress-total {
      font-size: 18px;
      color: var(--text-tertiary);
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }

    .gm-progress-label {
      font-size: 11px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      font-weight: 600;
      margin-left: 2px;
    }

    .gm-streak {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-tertiary);
      border: 1px solid rgba(255,255,255,0.06);
      font-size: 11px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
    }

    .gm-streak.active {
      background: rgba(242, 192, 99, 0.10);
      color: var(--warning);
      border-color: rgba(242, 192, 99, 0.32);
    }

    .gm-streak .icon {
      font-size: 13px;
    }

    .gm-streak.active .icon {
      filter: drop-shadow(0 0 6px rgba(242, 192, 99, 0.6));
    }

    .gm-bar {
      display: flex;
      gap: 4px;
      height: 6px;
    }

    .gm-bar:empty {
      display: none;
    }

    .gm-bar-seg {
      flex: 1;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
    }

    .gm-bar-seg-done {
      background: var(--success);
      box-shadow: 0 0 6px rgba(107,227,164,0.40);
    }

    .goal-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
    }

    .goal-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      margin-bottom: 6px;
      background: rgba(255,255,255,0.035);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      transition: background 0.2s ease, opacity 0.2s ease;
    }

    .goal-item:hover {
      background: rgba(255,255,255,0.06);
    }

    .goal-item.done {
      opacity: 0.45;
      background: rgba(107,227,164,0.04);
    }

    .goal-item.done .goal-text {
      text-decoration: line-through;
      text-decoration-color: rgba(255,255,255,0.4);
    }

    .goal-item.queued {
      background: rgba(242, 192, 99, 0.10);
      box-shadow: inset 3px 0 0 0 #F2C063;
      color: #FFE2A8;
    }

    .goal-handle {
      width: 14px;
      opacity: 0;
      transition: opacity 0.2s ease;
      letter-spacing: -2px;
      cursor: grab;
      color: var(--text-tertiary);
      user-select: none;
    }

    .goal-item:hover .goal-handle,
    .goal-item:hover .goal-delete {
      opacity: 1;
    }

    .goal-checkbox {
      width: 22px;
      height: 22px;
      border-radius: 7px;
      border: 1.5px solid rgba(255,255,255,0.18);
      background: rgba(5,5,6,0.7);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      transition: background 0.2s ease, box-shadow 0.2s ease, border 0.2s ease;
    }

    .goal-checkbox.checked {
      background: var(--success);
      box-shadow: 0 0 12px rgba(107,227,164,0.40);
      border-color: rgba(107,227,164,0.5);
    }

    .goal-checkbox.checked::after {
      content: "";
      width: 10px;
      height: 6px;
      border-left: 2px solid #0A0A0B;
      border-bottom: 2px solid #0A0A0B;
      transform: rotate(-45deg) scale(1);
      transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .goal-text {
      flex: 1;
      outline: none;
      padding: 2px 4px;
      border-radius: 6px;
    }

    .goal-text[contenteditable="true"] {
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
    }

    .gm-queue-btn {
      border: none;
      background: transparent;
      color: var(--text-tertiary);
      opacity: 0.55;
      cursor: pointer;
      font-size: 14px;
      transition: transform 0.2s ease, color 0.2s ease, opacity 0.2s ease;
    }

    .gm-queue-btn.active {
      color: var(--warning);
      opacity: 1;
      filter: drop-shadow(0 0 4px rgba(242,192,99,0.65));
    }

    .gm-queue-btn.flash {
      animation: gm-queue-flash 0.48s ease;
    }

    @keyframes gm-queue-flash {
      0% { transform: scale(1); background: transparent; }
      50% { transform: scale(1.015); background: rgba(242,192,99,0.32); }
      100% { transform: scale(1); background: transparent; }
    }

    .goal-delete {
      border: none;
      background: transparent;
      color: var(--text-tertiary);
      opacity: 0;
      cursor: pointer;
      font-size: 16px;
      transition: color 0.2s ease, opacity 0.2s ease;
    }

    .goal-delete:hover {
      color: var(--danger);
    }

    .empty-state {
      color: var(--text-tertiary);
      font-size: 12px;
      font-style: italic;
      text-align: center;
      padding: 14px 0;
    }

    .show-more {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px dashed rgba(255,255,255,0.18);
      color: var(--text-tertiary);
      font-size: 12px;
      cursor: pointer;
      margin-bottom: 8px;
    }

    .gm-push-btn {
      width: 100%;
      background: transparent;
      border: 1px dashed rgba(255,255,255,0.18);
      color: var(--text-tertiary);
      padding: 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: border 0.2s ease, color 0.2s ease, background 0.2s ease;
    }

    .gm-push-btn:hover {
      border-color: rgba(255,255,255,0.45);
      color: var(--text-primary);
      background: rgba(255,255,255,0.04);
    }

    .gm-input-wrap {
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 14px;
    }

    .gm-input-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .gm-input {
      flex: 1;
      min-width: 200px;
      padding: 11px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: var(--text-primary);
      outline: none;
      font-size: 13px;
    }

    .gm-input:focus {
      border-color: rgba(255,255,255,0.4);
    }

    .gm-btn-add {
      border: none;
      border-radius: 999px;
      padding: 11px 20px;
      font-weight: 700;
      cursor: pointer;
      color: #0A0A0B;
      background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%);
      box-shadow: 0 6px 16px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.8);
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .gm-btn-add:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .gm-btn-polish {
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 999px;
      padding: 11px 20px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-primary);
      background: rgba(255,255,255,0.04);
      box-shadow: 0 6px 16px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.2);
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .gm-btn-polish:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .gm-status {
      font-size: 11px;
      color: var(--text-tertiary);
      min-height: 14px;
    }

    .gm-card-tomorrow .gm-progress-row {
      display: none;
    }

    .gm-tomorrow-sub {
      font-size: 12px;
      color: var(--text-tertiary);
    }

    .gm-tomorrow-count {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }

    .gm-all-done {
      background: radial-gradient(320px 120px at 20% 0%, rgba(107,227,164,0.18), transparent 60%), var(--card-bg);
    }

    .gm-all-done .gm-progress-num,
    .gm-all-done .gm-progress-label {
      color: var(--success);
    }

    .goal-item.disabled .goal-checkbox,
    .goal-item.disabled .gm-queue-btn {
      opacity: 0.4;
      cursor: not-allowed;
    }

    @media (max-width: 480px) {
      .dash-title {
        font-size: 22px;
      }

      .goal-ticker {
        padding: 9px 12px;
      }

      .goal-ticker-label {
        font-size: 9px;
        letter-spacing: 0.14em;
      }

      .goal-ticker-row {
        font-size: 12px;
      }

      .goal-ticker-meta {
        font-size: 10px;
        padding: 2px 7px;
      }

      .ring-wrap {
        width: 144px;
        height: 144px;
      }

      .ring-percent {
        font-size: 32px;
      }

      .ring-status {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1 class="dash-title">My Dashboard</h1>

    <div class="ticker-row">
      <div class="goal-ticker" id="goalTicker" aria-live="polite" aria-atomic="true">
        <div class="goal-ticker-led"><span class="goal-ticker-led-dot"></span></div>
        <div class="goal-ticker-label">GOALS</div>
        <div class="goal-ticker-stage" id="goalTickerStage">
          <div class="goal-ticker-row">
            <span class="goal-ticker-status" data-status="">—</span>
            <span class="goal-ticker-text">Loading…</span>
          </div>
        </div>
        <div class="goal-ticker-meta" id="goalTickerMeta">0/0</div>
      </div>
    </div>

    <section class="card day-ring" aria-label="Day progress">
      <div class="ring-wrap">
        <svg viewBox="0 0 120 120" aria-hidden="true">
          <defs>
            <filter id="ringGlow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="2.5" result="coloredBlur" />
              <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>
          <circle cx="60" cy="60" r="52" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="8"></circle>
          <circle id="ringFill" cx="60" cy="60" r="52" fill="none" stroke="#FFD89E" stroke-width="8" stroke-linecap="round"
            stroke-dasharray="0" stroke-dashoffset="0" transform="rotate(-90 60 60)" filter="url(#ringGlow)"></circle>
        </svg>
        <div class="ring-center">
          <div class="ring-percent" id="ringPercent">—</div>
          <div class="ring-phase" id="ringPhase">SLEEPING</div>
          <div class="ring-clock" id="ringClock">--:--</div>
        </div>
      </div>
      <div class="ring-text">
        <div class="ring-status" id="ringStatus">Loading…</div>
        <div class="ring-remaining" id="ringRemaining">--</div>
        <div class="ring-range">8:00 AM – 12:00 AM</div>
      </div>
    </section>

    <section class="section" aria-label="To Do List">
      <div class="section-title">To Do List</div>

      <div class="card gm-card" id="todayCard">
        <div class="gm-header">
          <div>
            <div class="gm-eyebrow" id="todayLabel">Today —</div>
            <div class="gm-progress-row">
              <div class="gm-progress-num" id="gmProgressNum">0</div>
              <div class="gm-progress-total" id="gmProgressTotal">/ 0</div>
              <div class="gm-progress-label" id="gmProgressLabel">no goals yet</div>
            </div>
          </div>
          <div class="gm-streak" id="gmStreak">
            <span class="icon">⚡</span>
            <span class="mono" id="gmStreakNum">0</span>
            <span>day streak</span>
          </div>
        </div>

        <div class="gm-bar" id="gmBar"></div>

        <ul id="goalList" class="goal-list gm-list"></ul>
        <div id="emptyState" class="empty-state">No goals for today yet — add one below.</div>
        <div id="showMoreRow" class="show-more" hidden></div>

        <button class="gm-push-btn" id="gmPushBtn" type="button">Push remaining to tomorrow</button>

        <div class="gm-input-wrap gm-input-wrap">
          <div class="gm-input-row">
            <input class="gm-input" id="goalInput" type="text" placeholder="Add a goal for today…" />
            <button class="gm-btn-add" id="goalAddBtn" type="button">+ Add</button>
            <button class="gm-btn-polish" id="goalPolishBtn" type="button">✨ Polish</button>
          </div>
          <div class="gm-status" id="polishStatus"></div>
        </div>
      </div>

      <div class="card gm-card gm-card-tomorrow" id="tomorrowCard">
        <div class="gm-header">
          <div>
            <div class="gm-eyebrow" id="tomorrowLabel">Plan tomorrow —</div>
            <div class="gm-tomorrow-sub">Write tonight, locked until 6 AM.</div>
          </div>
          <div class="gm-tomorrow-count" id="gmTomorrowCount">0 planned</div>
        </div>

        <ul id="tomorrowList" class="goal-list"></ul>
        <div id="tomorrowEmpty" class="empty-state">Nothing planned for tomorrow yet.</div>

        <div class="gm-input-wrap gm-input-wrap">
          <div class="gm-input-row">
            <input class="gm-input" id="tomorrowInput" type="text" placeholder="Add a goal for tomorrow…" />
            <button class="gm-btn-add" id="tomorrowAddBtn" type="button">+ Add</button>
            <button class="gm-btn-polish" id="tomorrowPolishBtn" type="button">✨ Polish</button>
          </div>
          <div class="gm-status" id="tomorrowStatus"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const WAKE_HOUR = 8;
    const SLEEP_HOUR = 24;
    const TICK_INTERVAL = 5000;

    const ringFill = document.getElementById('ringFill');
    const ringPercent = document.getElementById('ringPercent');
    const ringPhase = document.getElementById('ringPhase');
    const ringClock = document.getElementById('ringClock');
    const ringStatus = document.getElementById('ringStatus');
    const ringRemaining = document.getElementById('ringRemaining');

    const goalList = document.getElementById('goalList');
    const emptyState = document.getElementById('emptyState');
    const showMoreRow = document.getElementById('showMoreRow');
    const goalInput = document.getElementById('goalInput');
    const goalAddBtn = document.getElementById('goalAddBtn');
    const goalPolishBtn = document.getElementById('goalPolishBtn');
    const polishStatus = document.getElementById('polishStatus');
    const gmProgressNum = document.getElementById('gmProgressNum');
    const gmProgressTotal = document.getElementById('gmProgressTotal');
    const gmProgressLabel = document.getElementById('gmProgressLabel');
    const gmBar = document.getElementById('gmBar');
    const gmStreak = document.getElementById('gmStreak');
    const gmStreakNum = document.getElementById('gmStreakNum');
    const gmPushBtn = document.getElementById('gmPushBtn');

    const tomorrowList = document.getElementById('tomorrowList');
    const tomorrowEmpty = document.getElementById('tomorrowEmpty');
    const tomorrowInput = document.getElementById('tomorrowInput');
    const tomorrowAddBtn = document.getElementById('tomorrowAddBtn');
    const tomorrowPolishBtn = document.getElementById('tomorrowPolishBtn');
    const tomorrowStatus = document.getElementById('tomorrowStatus');
    const gmTomorrowCount = document.getElementById('gmTomorrowCount');

    const todayLabel = document.getElementById('todayLabel');
    const tomorrowLabel = document.getElementById('tomorrowLabel');

    const goalTickerStage = document.getElementById('goalTickerStage');
    const goalTickerMeta = document.getElementById('goalTickerMeta');

    let showAllGoals = false;
    let tickerItems = [];
    let tickerIndex = 0;
    let tickerTimer = null;

    const sunStops = [
      { p: 0, c: [255, 216, 158] },
      { p: 12.5, c: [255, 205, 121] },
      { p: 25, c: [255, 227, 143] },
      { p: 37.5, c: [255, 183, 106] },
      { p: 50, c: [255, 149, 89] },
      { p: 62.5, c: [243, 111, 79] },
      { p: 75, c: [226, 93, 122] },
      { p: 87.5, c: [123, 91, 176] },
      { p: 100, c: [47, 58, 102] }
    ];

    function formatDateLabel(date) {
      return date.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
    }

    function dateKey(date) {
      return date.toISOString().slice(0, 10);
    }

    function getStorageKey(date) {
      return `goals:${dateKey(date)}`;
    }

    function readGoals(date) {
      const raw = localStorage.getItem(getStorageKey(date));
      if (!raw) return [];
      try {
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (err) {
        return [];
      }
    }

    function storeGoals(date, goals) {
      localStorage.setItem(getStorageKey(date), JSON.stringify(goals));
      window.dispatchEvent(new CustomEvent('goals-changed'));
    }

    function updateLabels() {
      const now = new Date();
      const tomorrow = new Date(now);
      tomorrow.setDate(now.getDate() + 1);
      todayLabel.textContent = `Today — ${formatDateLabel(now)}`;
      tomorrowLabel.textContent = `Plan tomorrow — ${formatDateLabel(tomorrow)}`;
    }

    function clamp(num, min, max) {
      return Math.min(max, Math.max(min, num));
    }

    function interpolateColor(percent) {
      for (let i = 0; i < sunStops.length - 1; i += 1) {
        const a = sunStops[i];
        const b = sunStops[i + 1];
        if (percent >= a.p && percent <= b.p) {
          const t = (percent - a.p) / (b.p - a.p);
          const rgb = a.c.map((value, idx) => Math.round(value + (b.c[idx] - value) * t));
          return `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
        }
      }
      return 'rgb(255, 216, 158)';
    }

    function formatTime(hoursFloat) {
      const hours = Math.floor(hoursFloat);
      const minutes = Math.floor((hoursFloat - hours) * 60);
      const h = hours % 12 || 12;
      const ampm = hours >= 12 ? 'PM' : 'AM';
      return `${h}:${String(minutes).padStart(2, '0')} ${ampm}`;
    }

    function updateDayRing() {
      const now = new Date();
      const hours = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;
      const awakeSpan = SLEEP_HOUR - WAKE_HOUR;
      const circumference = 2 * Math.PI * 52;
      ringFill.style.strokeDasharray = `${circumference}`;
      ringFill.style.transition = 'stroke 0.7s cubic-bezier(0.22, 1, 0.36, 1), stroke-dashoffset 0.7s cubic-bezier(0.22, 1, 0.36, 1)';

      ringClock.textContent = formatTime(hours);

      if (hours < WAKE_HOUR) {
        ringFill.style.stroke = '#4D4B47';
        ringFill.style.strokeDashoffset = `${circumference}`;
        ringPercent.textContent = '—';
        ringPhase.textContent = 'SLEEPING';
        const remaining = WAKE_HOUR - hours;
        ringStatus.textContent = '😴 Still sleeping';
        ringRemaining.textContent = `${Math.floor(remaining)}h ${Math.round((remaining % 1) * 60)}m until wake-up`;
        return;
      }

      if (hours >= SLEEP_HOUR) {
        ringFill.style.stroke = '#E25D7A';
        ringFill.style.strokeDashoffset = '0';
        ringPercent.textContent = '100%';
        ringPhase.textContent = 'PAST BEDTIME';
        ringStatus.textContent = '⚠️ Past bedtime';
        ringRemaining.textContent = 'Sleep!';
        return;
      }

      const percent = clamp(((hours - WAKE_HOUR) / awakeSpan) * 100, 0, 100);
      const offset = circumference * (1 - percent / 100);
      ringFill.style.strokeDashoffset = `${offset}`;
      ringFill.style.stroke = interpolateColor(percent);
      ringPercent.textContent = `${Math.round(percent)}%`;

      const remaining = awakeSpan - (hours - WAKE_HOUR);
      ringRemaining.textContent = `${Math.floor(remaining)}h ${Math.round((remaining % 1) * 60)}m awake time left`;

      if (percent < 25) {
        ringPhase.textContent = 'MORNING';
        ringStatus.textContent = '☀️ Morning — fresh start';
      } else if (percent < 50) {
        ringPhase.textContent = 'MIDDAY';
        ringStatus.textContent = '⚡ Midday — keep moving';
      } else if (percent < 75) {
        ringPhase.textContent = 'AFTERNOON';
        ringStatus.textContent = '🔥 Afternoon — push it';
      } else if (percent < 90) {
        ringPhase.textContent = 'EVENING';
        ringStatus.textContent = '⏳ Evening — wrap up';
      } else {
        ringPhase.textContent = 'BEDTIME';
        ringStatus.textContent = '🌙 Bedtime soon';
      }
    }

    function polishText(value) {
      const trimmed = value.trim().replace(/\s+/g, ' ');
      if (!trimmed) return '';
      return trimmed.charAt(0).toUpperCase() + trimmed.slice(1);
    }

    function showStatus(el, message) {
      el.textContent = message;
      if (!message) return;
      setTimeout(() => {
        if (el.textContent === message) {
          el.textContent = '';
        }
      }, 1800);
    }

    function addGoal(date, text) {
      if (!text.trim()) return;
      const goals = readGoals(date);
      goals.push({
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
        text: text.trim(),
        done: false,
        queued: false,
        createdAt: Date.now()
      });
      storeGoals(date, goals);
    }

    function updateStreak(total, doneCount) {
      const streakKey = 'goal-streak';
      const today = dateKey(new Date());
      const yesterday = dateKey(new Date(Date.now() - 86400000));
      const raw = localStorage.getItem(streakKey);
      let streak = { count: 0, lastDate: null };
      if (raw) {
        try {
          streak = JSON.parse(raw);
        } catch (err) {
          streak = { count: 0, lastDate: null };
        }
      }

      if (streak.lastDate && streak.lastDate !== today && streak.lastDate !== yesterday) {
        streak.count = 0;
      }

      if (total > 0 && doneCount === total && streak.lastDate !== today) {
        if (streak.lastDate === yesterday) {
          streak.count += 1;
        } else {
          streak.count = 1;
        }
        streak.lastDate = today;
        localStorage.setItem(streakKey, JSON.stringify(streak));
      }

      gmStreakNum.textContent = String(streak.count || 0);
      if (streak.count > 0) {
        gmStreak.classList.add('active');
      } else {
        gmStreak.classList.remove('active');
      }
    }

    function renderGoals() {
      const today = new Date();
      const goals = readGoals(today);
      const total = goals.length;
      const doneCount = goals.filter(g => g.done).length;

      gmProgressNum.textContent = String(doneCount);
      gmProgressTotal.textContent = `/ ${total}`;

      if (total === 0) {
        gmProgressLabel.textContent = 'no goals yet';
      } else if (doneCount === total) {
        gmProgressLabel.textContent = 'all done — solid day';
      } else {
        gmProgressLabel.textContent = 'complete';
      }

      gmBar.innerHTML = '';
      goals.forEach(goal => {
        const seg = document.createElement('div');
        seg.className = 'gm-bar-seg' + (goal.done ? ' gm-bar-seg-done' : '');
        gmBar.appendChild(seg);
      });

      const todayCard = document.getElementById('todayCard');
      if (total > 0 && doneCount === total) {
        todayCard.classList.add('gm-all-done');
      } else {
        todayCard.classList.remove('gm-all-done');
      }

      updateStreak(total, doneCount);

      goalList.innerHTML = '';
      emptyState.style.display = total === 0 ? 'block' : 'none';

      const visibleGoals = showAllGoals ? goals : goals.slice(0, 5);
      visibleGoals.forEach((goal, index) => {
        const row = document.createElement('li');
        row.className = `goal-item${goal.done ? ' done' : ''}${goal.queued ? ' queued' : ''}`;
        row.setAttribute('data-id', goal.id);
        row.draggable = true;

        const handle = document.createElement('div');
        handle.className = 'goal-handle';
        handle.textContent = '⋮⋮';
        handle.title = 'Drag to reorder';

        const checkbox = document.createElement('div');
        checkbox.className = `goal-checkbox${goal.done ? ' checked' : ''}`;
        checkbox.setAttribute('role', 'checkbox');
        checkbox.setAttribute('aria-checked', goal.done ? 'true' : 'false');
        checkbox.addEventListener('click', () => {
          goal.done = !goal.done;
          storeGoals(today, goals);
        });

        const text = document.createElement('div');
        text.className = 'goal-text';
        text.textContent = goal.text;
        text.tabIndex = 0;
        text.addEventListener('click', () => {
          text.contentEditable = 'true';
          text.focus();
        });
        text.addEventListener('blur', () => {
          if (text.isContentEditable) {
            text.contentEditable = 'false';
            const updated = text.textContent.trim();
            goal.text = updated || goal.text;
            storeGoals(today, goals);
          }
        });
        text.addEventListener('keydown', (event) => {
          if (event.key === 'Enter') {
            event.preventDefault();
            text.blur();
          }
          if (event.key === 'Escape') {
            event.preventDefault();
            text.textContent = goal.text;
            text.contentEditable = 'false';
          }
        });

        const queueBtn = document.createElement('button');
        queueBtn.className = `gm-queue-btn${goal.queued ? ' active' : ''}`;
        queueBtn.textContent = '⚡';
        queueBtn.title = 'Queue for productivity window';
        queueBtn.addEventListener('click', () => {
          goal.queued = !goal.queued;
          queueBtn.classList.add('flash');
          setTimeout(() => queueBtn.classList.remove('flash'), 480);
          storeGoals(today, goals);
        });

        const del = document.createElement('button');
        del.className = 'goal-delete';
        del.textContent = '×';
        del.title = 'Delete goal';
        del.addEventListener('click', () => {
          const idx = goals.findIndex(item => item.id === goal.id);
          if (idx >= 0) {
            goals.splice(idx, 1);
            storeGoals(today, goals);
          }
        });

        row.append(handle, checkbox, text, queueBtn, del);
        goalList.appendChild(row);

        row.addEventListener('dragstart', (event) => {
          event.dataTransfer.setData('text/plain', String(index));
          event.dataTransfer.effectAllowed = 'move';
          row.classList.add('dragging');
        });

        row.addEventListener('dragend', () => {
          row.classList.remove('dragging');
        });

        row.addEventListener('dragover', (event) => {
          event.preventDefault();
        });

        row.addEventListener('drop', (event) => {
          event.preventDefault();
          const fromIndex = Number(event.dataTransfer.getData('text/plain'));
          const toIndex = index;
          if (Number.isNaN(fromIndex) || fromIndex === toIndex) return;
          const moved = goals.splice(fromIndex, 1)[0];
          goals.splice(toIndex, 0, moved);
          storeGoals(today, goals);
        });
      });

      const remaining = goals.filter(goal => !goal.done).length;
      gmPushBtn.style.display = remaining > 0 ? 'block' : 'none';

      if (goals.length > 5) {
        const hiddenCount = goals.length - 5;
        showMoreRow.hidden = false;
        showMoreRow.textContent = showAllGoals
          ? 'Show less ▴'
          : `Show ${hiddenCount} more ▾`;
      } else {
        showMoreRow.hidden = true;
      }
    }

    function renderTomorrow() {
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      const goals = readGoals(tomorrow);

      tomorrowList.innerHTML = '';
      tomorrowEmpty.style.display = goals.length === 0 ? 'block' : 'none';
      gmTomorrowCount.textContent = `${goals.length} planned`;

      goals.forEach(goal => {
        const row = document.createElement('li');
        row.className = 'goal-item disabled' + (goal.queued ? ' queued' : '') + (goal.done ? ' done' : '');

        const handle = document.createElement('div');
        handle.className = 'goal-handle';
        handle.textContent = '⋮⋮';

        const checkbox = document.createElement('div');
        checkbox.className = `goal-checkbox${goal.done ? ' checked' : ''}`;
        checkbox.title = 'Activates at 6 AM tomorrow';

        const text = document.createElement('div');
        text.className = 'goal-text';
        text.textContent = goal.text;

        const queueBtn = document.createElement('button');
        queueBtn.className = 'gm-queue-btn';
        queueBtn.textContent = '⚡';
        queueBtn.disabled = true;
        queueBtn.title = 'Activates at 6 AM tomorrow';

        const del = document.createElement('button');
        del.className = 'goal-delete';
        del.textContent = '×';
        del.title = 'Delete goal';
        del.addEventListener('click', () => {
          const idx = goals.findIndex(item => item.id === goal.id);
          if (idx >= 0) {
            goals.splice(idx, 1);
            storeGoals(tomorrow, goals);
          }
        });

        row.append(handle, checkbox, text, queueBtn, del);
        tomorrowList.appendChild(row);
      });
    }

    function moveRemainingToTomorrow() {
      const today = new Date();
      const tomorrow = new Date();
      tomorrow.setDate(today.getDate() + 1);

      const todayGoals = readGoals(today);
      const tomorrowGoals = readGoals(tomorrow);
      const remaining = todayGoals.filter(goal => !goal.done);
      if (remaining.length === 0) return;

      const existingTexts = new Set(tomorrowGoals.map(goal => goal.text));
      remaining.forEach(goal => {
        if (!existingTexts.has(goal.text)) {
          tomorrowGoals.push({
            ...goal,
            id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
            done: false,
            queued: false,
            createdAt: Date.now()
          });
        }
      });

      const kept = todayGoals.filter(goal => goal.done);
      storeGoals(today, kept);
      storeGoals(tomorrow, tomorrowGoals);
    }

    function buildTickerItems() {
      const today = new Date();
      const goals = readGoals(today);
      const total = goals.length;
      const doneCount = goals.filter(goal => goal.done).length;
      goalTickerMeta.textContent = `${doneCount}/${total}`;

      if (total === 0) {
        return [{ status: 'empty', text: 'No goals set for today — add one to get rolling.' }];
      }

      if (doneCount === total) {
        return [{ status: 'done', text: '✓ All goals done — solid day.' }];
      }

      return goals.filter(goal => !goal.done).map(goal => ({ status: 'pending', text: goal.text }));
    }

    function statusGlyph(status) {
      if (status === 'done') return '✓';
      if (status === 'pending') return '○';
      return '·';
    }

    function statusColor(status) {
      if (status === 'done') return 'var(--success)';
      return 'var(--text-tertiary)';
    }

    function renderTickerRow(item, animate) {
      const row = document.createElement('div');
      row.className = 'goal-ticker-row';

      const status = document.createElement('span');
      status.className = 'goal-ticker-status';
      status.dataset.status = item.status;
      status.textContent = statusGlyph(item.status);
      status.style.color = statusColor(item.status);

      const text = document.createElement('span');
      text.className = 'goal-ticker-text';
      text.textContent = item.text;

      row.append(status, text);
      if (animate) {
        row.classList.add('is-entering');
      }
      return row;
    }

    function tickTicker() {
      tickerItems = buildTickerItems();
      if (tickerItems.length === 0) return;

      const current = tickerItems[tickerIndex % tickerItems.length];
      const existing = goalTickerStage.querySelector('.goal-ticker-row');

      if (existing) {
        existing.classList.add('is-leaving');
        setTimeout(() => {
          if (existing.parentNode) {
            existing.parentNode.removeChild(existing);
          }
        }, 460);
      }

      const entering = renderTickerRow(current, !!existing);
      goalTickerStage.appendChild(entering);

      tickerIndex = (tickerIndex + 1) % tickerItems.length;
    }

    function startTicker() {
      tickerIndex = 0;
      tickTicker();
      if (tickerTimer) clearInterval(tickerTimer);
      tickerTimer = setInterval(tickTicker, TICK_INTERVAL);
    }

    function bindInputs() {
      goalAddBtn.addEventListener('click', () => {
        const value = goalInput.value.trim();
        if (!value) return;
        addGoal(new Date(), value);
        goalInput.value = '';
      });

      goalInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          goalAddBtn.click();
        }
      });

      goalPolishBtn.addEventListener('click', () => {
        const polished = polishText(goalInput.value);
        if (!polished) {
          showStatus(polishStatus, 'Add a draft goal first.');
          return;
        }
        goalInput.value = polished;
        showStatus(polishStatus, 'Polished.');
      });

      tomorrowAddBtn.addEventListener('click', () => {
        const value = tomorrowInput.value.trim();
        if (!value) return;
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        addGoal(tomorrow, value);
        tomorrowInput.value = '';
      });

      tomorrowInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          tomorrowAddBtn.click();
        }
      });

      tomorrowPolishBtn.addEventListener('click', () => {
        const polished = polishText(tomorrowInput.value);
        if (!polished) {
          showStatus(tomorrowStatus, 'Add a draft goal first.');
          return;
        }
        tomorrowInput.value = polished;
        showStatus(tomorrowStatus, 'Polished.');
      });

      showMoreRow.addEventListener('click', () => {
        showAllGoals = !showAllGoals;
        renderGoals();
      });

      gmPushBtn.addEventListener('click', () => {
        if (window.confirm('Move all unchecked goals to tomorrow?')) {
          moveRemainingToTomorrow();
        }
      });
    }

    function refreshAll() {
      updateLabels();
      renderGoals();
      renderTomorrow();
      startTicker();
    }

    window.addEventListener('goals-changed', () => {
      tickerIndex = 0;
      renderGoals();
      renderTomorrow();
      tickTicker();
    });

    updateDayRing();
    setInterval(updateDayRing, 60 * 1000);

    updateLabels();
    bindInputs();
    refreshAll();
  </script>
</body>
</html>
